<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
        }

        .login-card {
            width: 360px;
            padding: 28px;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        }

        .login-card h2 {
            margin-top: 0;
            margin-bottom: 14px;
            color: #111827;
        }

        .login-card input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        #message {
            margin-top: 10px;
            color: #dc2626;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Campus Maintenance Login</h2>

    <form id="loginForm">
        <input type="text" name="user_code" placeholder="User Code" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="message"></p>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

</body>
</html>
